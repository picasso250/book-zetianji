<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
  <meta charset="UTF-8">
{% seo %}
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/chapter.css?v=' | append: site.github.build_revision | relative_url }}">

  <!-- Matomo -->
  <script type="text/javascript">
    var _paq = _paq || [];
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);
    (function() {
      var u="//analytics.avavav.club/";
      _paq.push(['setTrackerUrl', u+'piwik.php']);
      _paq.push(['setSiteId', '4']);
      var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
      g.type='text/javascript'; g.async=true; g.defer=true; g.src=u+'piwik.js'; s.parentNode.insertBefore(g,s);
    })();
  </script>
  <!-- End Matomo Code -->
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="site-title">{{ site.title | default: site.github.repository_name }}</a>
      <span class="site-desc">{{ site.description | default: site.github.project_tagline }}</span>
    </div>
  </header>

  <article class="chapter">
    <span class="chapter-hero"></span>

    <h1 class="chapter-title">{{ page.title }}</h1>

    <nav class="chapter-nav">
      <a class="prev-link" href="#">上一章</a>
      <a class="toc-link" href="/">目 录</a>
      <a class="next-link" href="#">下一章</a>
    </nav>

    <div class="chapter-body">
      {{ content }}
    </div>

    <nav class="chapter-nav chapter-nav-bottom">
      <a class="prev-link" href="#">上一章</a>
      <a class="toc-link" href="/">目 录</a>
      <a class="next-link" href="#">下一章</a>
    </nav>
  </article>

  <footer class="site-footer">
    <span>{{ site.title }} · {{ site.description }}</span>
  </footer>

  <div class="role-tooltip" id="role-tooltip"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      /* ---- TOC navigation ---- */
      const toc = {
        "引子":"/zh_CN/pdl/2083-after/0000yin zi",
        "新年：救赎":"/zh_CN/pdl/2083-after/side/xin nian jiu shu",
        "新年：福音——DAY OPEN":"/zh_CN/pdl/xin nian fu yin0022-day open",
        "新年：福音——DAY ONE":"/zh_CN/pdl/xin nian fu yin0023-day one",
        "新年：福音——DAY FALL":"/zh_CN/pdl/xin nian fu yin0024-day fall",
        "新年：福音——DAY REST":"/zh_CN/pdl/xin nian fu yin0025-day rest",
        "新年：福音——DAY SET":"/zh_CN/pdl/xin nian fu yin0026-day set",
        "新年：福音——DAY BREAK-phase1":"/zh_CN/pdl/xin nian fu yin0027-day break-phase1",
        "之前的事":"/zh_CN/pdl/2083-after/side/zhi qian de shi",
        "看热闹的人":"/zh_CN/pdl/2083-after/side/kan re nao de ren",
        "启明之猩":"/zh_CN/8898012",
        "魂海守望者":"/zh_CN/pdl/2083-after/side/hun hai shou wang zhe",
        "狐狸与太阳":"/zh_CN/pdl/2083-after/side/hu li yu tai yang",
        "Chapter 0 风暴前夕":"/zh_CN/pdl/2083-after/000feng bao qian xi",
        "Chapter 1 约柜":"/zh_CN/pdl/2083-after/001yue gui",
        "Chapter 2 第一接触者":"/zh_CN/pdl/2083-after/002di yi jie chu zhe",
        "Chapter 3 九尾狐":"/zh_CN/pdl/2083-after/003jiu wei hu",
        "Chapter 4 诸海之白麒麟":"/zh_CN/pdl/2083-after/004zhu hai zhi bai qi lin",
        "Chapter 5 以钥匙通过那门":"/zh_CN/pdl/2083-after/005yi yao shi tong guo na men",
        "Chapter 6 善后":"/zh_CN/pdl/2083-after/006shan hou",
        "Chapter 7 醒来":"/zh_CN/pdl/2083-after/007xing lai",
        "Chapter 8 皇帝":"/zh_CN/pdl/2083-after/008huang di",
        "Chapter 9 佛雷卡们":"/zh_CN/pdl/2083-after/009fu lei ka men",
        "Chapter 10 我是神眷之人":"/zh_CN/pdl/2083-after/010wo shi shen juan zhi ren"
      };
      const tocPos = Object.keys(toc);
      const title = "{{ page.title }}";
      const pos = tocPos.indexOf(title);
      if (pos > 0) {
        document.querySelectorAll('a.prev-link').forEach(function (link) {
          link.href = toc[tocPos[pos - 1]];
          link.title = tocPos[pos - 1];
        });
      } else {
        document.querySelectorAll('a.prev-link').forEach(function (link) {
          link.classList.add('disabled');
        });
      }
      if (pos >= 0 && pos < tocPos.length - 1) {
        document.querySelectorAll('a.next-link').forEach(function (link) {
          link.href = toc[tocPos[pos + 1]];
          link.title = tocPos[pos + 1];
        });
      } else {
        document.querySelectorAll('a.next-link').forEach(function (link) {
          link.classList.add('disabled');
        });
      }

      /* ---- Role-name tooltips ---- */
      const tooltip = document.getElementById('role-tooltip');
      let roleMap = null;

      function showTooltip(e) {
        if (!roleMap) return;
        const name = this.textContent;
        const desc = roleMap[name];
        if (!desc) return;
        tooltip.replaceChildren();
        const strong = document.createElement('strong');
        strong.textContent = name;
        const paragraph = document.createElement('p');
        paragraph.textContent = desc;
        tooltip.append(strong, paragraph);
        tooltip.classList.add('visible');
        positionTooltip(e);
      }

      function positionTooltip(e) {
        let x = e.clientX + 16;
        let y = e.clientY + 12;
        const tw = tooltip.offsetWidth;
        const th = tooltip.offsetHeight;
        if (x + tw > window.innerWidth - 8) x = e.clientX - tw - 16;
        if (y + th > window.innerHeight - 8) y = e.clientY - th - 12;
        if (x < 4) x = 4;
        if (y < 4) y = 4;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
      }

      function hideTooltip() {
        tooltip.classList.remove('visible');
      }

      function markRoleNames(paragraph, regex) {
        const walker = document.createTreeWalker(paragraph, NodeFilter.SHOW_TEXT);
        const textNodes = [];
        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }

        textNodes.forEach(function (node) {
          const text = node.nodeValue;
          regex.lastIndex = 0;
          if (!regex.test(text)) return;
          regex.lastIndex = 0;

          const fragment = document.createDocumentFragment();
          let lastIndex = 0;
          let match;
          while ((match = regex.exec(text)) !== null) {
            if (match.index > lastIndex) {
              fragment.append(document.createTextNode(text.slice(lastIndex, match.index)));
            }
            const span = document.createElement('span');
            span.className = 'role-name';
            span.textContent = match[0];
            fragment.append(span);
            lastIndex = match.index + match[0].length;
          }
          if (lastIndex < text.length) {
            fragment.append(document.createTextNode(text.slice(lastIndex)));
          }
          node.replaceWith(fragment);
        });
      }

      fetch('/roles.json')
        .then(function (response) {
          if (!response.ok) throw new Error('Unable to load roles.json');
          return response.json();
        })
        .then(function (data) {
          roleMap = data;
          if (!roleMap || !Object.keys(roleMap).length) return;
          const names = Object.keys(roleMap).sort(function(a,b){ return b.length - a.length; });
          const pattern = names.map(function(n){ return n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }).join('|');
          const regex = new RegExp(pattern, 'g');
          document.querySelectorAll('.chapter-body p').forEach(function (paragraph) {
            markRoleNames(paragraph, regex);
          });
        })
        .catch(function () {});

      document.addEventListener('mouseenter', function (e) {
        if (e.target.classList.contains('role-name')) showTooltip.call(e.target, e);
      }, true);
      document.addEventListener('mouseleave', function (e) {
        if (e.target.classList.contains('role-name')) hideTooltip();
      }, true);
      document.addEventListener('mousemove', function (e) {
        if (e.target.classList.contains('role-name')) positionTooltip(e);
      });

      /* ---- Move first image to hero area on mobile ---- */
      const firstImg = document.querySelector('.chapter-body img');
      const chapterHero = document.querySelector('.chapter-hero');
      if (firstImg && chapterHero) {
        chapterHero.prepend(firstImg);
      }
    });
  </script>

  {% if site.google_analytics %}
  <script type="text/javascript">
    (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
    (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
    m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
    })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
    ga('create', '{{ site.google_analytics }}', 'auto');
    ga('send', 'pageview');
  </script>
  {% endif %}

</body>
</html>
